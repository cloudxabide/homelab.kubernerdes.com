# dhcpd-hosts.conf — Fixed DHCP host entries for the shared homelab /24
#
# Included by dhcpd.conf. Devices here are not part of any Harvester cluster
# and use the global "homelab.kubernerdes.com" domain (no per-host override).

# GLKVM
host glkvm {
  option host-name "glkvm.homelab.kubernerdes.com";
  hardware ethernet 94:83:c4:b1:ea:43;
  fixed-address 10.10.12.20;
}

