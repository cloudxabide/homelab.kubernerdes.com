# dhcpd.conf — DHCP server configuration for homelab.kubernerdes.com
#
# Served by nuc-00 (10.10.12.10) across the full 10.10.12.0/22 supernet.
#
# Historically this ran on a dedicated infra VM (nuc-00-01, 10.10.12.8), with
# nuc-00-02 (10.10.12.9) as DNS secondary. Both VMs are retired — nuc-00 runs
# DHCP, DNS, and TFTP/PXE-HTTP directly on the admin host now.
#
# Subnets:
#   10.10.12.0/24  homelab   — shared infrastructure (DNS, DHCP, admin, NAS)
#   10.10.13.0/24  enclave   — nuc-01/02/03 (air-gapped via Harbor)
#   10.10.14.0/24  community — nuc-01/02/03 (Gen13 NUCs, public registries)
#   10.10.15.0/24  prime     — nuc-01/02/03 (RGS Prime registry)
#
# Dynamic pool covers homelab (10.10.12.x) only — enclave/community/prime
# pools are managed by Harvester within each environment's /24.
# Cluster NUC nodes (Harvester) have fixed addresses in .101-.103 per /24,
# assigned below by MAC address (see Hardware.md for the source of truth).
# Additional fixed hosts (KVMs, workstations, spark-e) are in dhcpd.d/.

# iPXE option definitions
option space pxelinux;
option pxelinux.magic code 208 = string;
option pxelinux.configfile code 209 = text;
option pxelinux.pathprefix code 210 = text;
option pxelinux.reboottime code 211 = unsigned integer 32;
option architecture-type code 93 = unsigned integer 16;

# Global options
option domain-name "homelab.kubernerdes.com";
option domain-name-servers 10.10.12.10;
default-lease-time 7200;
max-lease-time 7200;
authoritative;

# Subnet declaration — covers the full 10.10.12.0/22 supernet
subnet 10.10.12.0 netmask 255.255.252.0 {
    option routers 10.10.12.1;
    option subnet-mask 255.255.252.0;

    # Dynamic pool — homelab /24 only; environment /24s are managed by Harvester
    pool {
        range 10.10.12.128 10.10.12.254;
    }

    # TFTP server for initial iPXE handoff — now nuc-00 itself
    next-server 10.10.12.10;

    if exists user-class and option user-class = "iPXE" {
        # Client already has iPXE, send them to the boot menu served by Apache
        filename "http://10.10.12.10/harvester/harvester/ipxe-menu";
    } else {
        # Send iPXE EFI binary for UEFI boot
        filename "ipxe.efi";
    }
}

